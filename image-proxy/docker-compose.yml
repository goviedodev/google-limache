version: '3.8'

services:
  image-proxy:
    build: .
    image: imaglim-image-proxy:latest
    container_name: imaglim-image-proxy
    ports:
      - "14771:14771"
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-AIzaSyBsup_X4cG3AstLomRcc34SaBT1xeUp2Qs}
      - PORT=14771
    volumes:
      - ./photos:/app/photos
    restart: unless-stopped