version: '3.8'

services:
  imaglim:
    build: .
    image: imaglim:latest
    container_name: imaglim
    environment:
      - CLOUDFLARED_TOKEN=${CLOUDFLARED_TOKEN}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-AIzaSyBsup_X4cG3AstLomRcc34SaBT1xeUp2Qs}
      - TUNNEL_URL=http://localhost:5000
    volumes:
      - ./photos:/app/photos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Sin puertos expuestos - todo va por Cloudflare Tunnel